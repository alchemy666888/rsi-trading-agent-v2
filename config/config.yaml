asset:
  symbol: "BTC/USDT"
  timeframe: "1m"
  exchange: "binance"
  fetch_limit: 260000
  # Set to a CSV path (timestamp,open,high,low,close,volume) to skip live fetch.
  # Run scripts/fetch_real_data.py once to populate this file with ~6 months of real data.
  # Remove or leave blank to fetch from the exchange when network is available.
  local_cache_path: "data/btc_1m_real.csv"

runtime:
  cycle_interval_seconds: 60
  max_cycles: 1100
  warmup_bars: 50
  report_path: "reports/week3_report.md"

simulation:
  initial_equity: 10000.0
  slippage_bps: 5
  long_threshold: 0.55
  short_threshold: 0.45
  optimization_interval_cycles: 10
  sharpe_trigger: 1.5
  optuna_trials: 30
  replay_buffer_limit: 10000
  stop_loss_pct: 0.02
  funding_rate_per_8h: 0.0001    # 0.01% per 8h (480 1m bars); Binance perpetual typical rate

model:
  train_split_ratio: 0.7
  min_train_rows: 400
  n_estimators: 200
  learning_rate: 0.05
  num_leaves: 63
  max_depth: -1
  min_child_samples: 20
  subsample: 0.85
  colsample_bytree: 0.85
  random_state: 42
  n_jobs: -1
  walk_forward_n_estimators: 120
  label_horizon: 1              # bars forward for target_up label; try 5 if WF accuracy stays < 51%

walk_forward:
  train_bars: 800
  test_bars: 100
  step_bars: 200
  interval_cycles: 500
  embargo_gap: 61               # must be >= max_lag + label_horizon + 1 (60 + 1 + 1 = 62 for horizon=1 is fine; update to 66 for horizon=5)

api_keys:
  polygon_api_key: ""
  ccxt_api_key: ""
  ccxt_api_secret: ""

logging:
  level: "INFO"
